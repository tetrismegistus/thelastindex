# /etc/nginx/sites-available/budget.thelastindex.com

server {
    listen 80;
    server_name budget.thelastindex.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name budget.thelastindex.com;

    ssl_certificate     /etc/letsencrypt/live/thelastindex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thelastindex.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HTTP Basic Auth — one htpasswd file, two users
    auth_basic           "budget";
    auth_basic_user_file /etc/nginx/.htpasswd-budget;

    location / {
        proxy_pass         http://127.0.0.1:8741;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
